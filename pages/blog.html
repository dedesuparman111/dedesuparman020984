<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Dede Separman</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
</head>
<body class="page-blog">

  <header class="navbar scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="../index.html" class="navbar__logo">Dede Separman</a>
      <nav class="navbar__menu" id="navMenu">
        <a href="../index.html" class="navbar__link">Home</a>
        <a href="tentang.html" class="navbar__link">Tentang</a>
        <a href="skill.html" class="navbar__link">Skill</a>
        <a href="proyek.html" class="navbar__link">Proyek</a>
        <a href="layanan.html" class="navbar__link">Layanan</a>
        <a href="blog.html" class="navbar__link active">Blog</a>
        <a href="kontak.html" class="navbar__link">Kontak</a>
      </nav>
      <div class="navbar__lang">
        <a href="#" class="lang-btn active" data-lang="id">ID</a>
        <a href="#" class="lang-btn" data-lang="en">EN</a>
      </div>
      <button class="navbar__burger" id="burgerBtn"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <section class="page-header">
      <div class="container">
        <p class="section-label">Artikel & Tutorial</p>
        <h1 class="page-title">Blog <span class="accent">Saya</span></h1>
        <p class="page-subtitle">Tulisan seputar Google Apps Script, otomatisasi, dan produktivitas kerja.</p>
      </div>
    </section>

    <section class="section-pad">
      <div class="container">
        <div class="blog-grid" id="blogGrid">
          <div class="project-skeleton"></div>
          <div class="project-skeleton"></div>
          <div class="project-skeleton"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__brand">Dede Separman</p>
      <p class="footer__copy">© <span id="year"></span> Dede Separman.</p>
      <nav class="footer__nav"><a href="kontak.html">Kontak</a></nav>
    </div>
  </footer>

  <script src="../js/supabase-client.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function initBlog() {
      const grid = document.getElementById('blogGrid');
      let posts = [];
      try {
        if (window.DB) posts = await window.DB.loadPosts({ limit: 12 });
        if (!posts.length) posts = getFallbackPosts();
      } catch {
        posts = getFallbackPosts();
      }

      grid.innerHTML = posts.map(p => `
        <article class="blog-card">
          <div class="blog-card__cover" style="background:${p.cover_color||'var(--gray-100)'};display:flex;align-items:center;justify-content:center;font-size:3rem">
            ${p.cover_emoji || '📝'}
          </div>
          <div class="blog-card__body">
            <p class="blog-card__meta">${p.published_at ? new Date(p.published_at).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}) : ''} · ${p.read_time || '5'} menit baca</p>
            <h3>${p.title}</h3>
            <p>${p.excerpt || ''}</p>
            <a href="blog-post.html?slug=${p.slug}" class="blog-card__link">Baca Selengkapnya →</a>
          </div>
        </article>
      `).join('');
    }

    function getFallbackPosts() {
      return [
        { cover_emoji: '⚡', title: 'Cara Membuat Bot WhatsApp dengan Google Apps Script', excerpt: 'Tutorial lengkap integrasi WhatsApp API dengan Google Apps Script untuk notifikasi otomatis.', published_at: '2024-05-01', read_time: 8, slug: 'bot-whatsapp-apps-script' },
        { cover_emoji: '📊', title: '5 Template AppSheet Gratis untuk UMKM', excerpt: 'Kumpulan template AppSheet siap pakai yang bisa langsung digunakan untuk bisnis kecil menengah.', published_at: '2024-04-15', read_time: 5, slug: 'template-appsheet-umkm' },
        { cover_emoji: '🔄', title: 'Otomatisasi Laporan Bulanan dengan Google Sheets', excerpt: 'Langkah demi langkah membuat laporan otomatis yang ter-generate setiap awal bulan tanpa manual.', published_at: '2024-03-20', read_time: 6, slug: 'laporan-otomatis-sheets' },
      ];
    }

    initBlog();
  </script>
</body>
</html>
