  <script>
    // Public project page (no admin gate)
    let allProjects = [];

    async function initProjects() {
      const grid = document.getElementById('projectsGrid');
      try {
        if (window.DB) {
          allProjects = await window.DB.loadProjects({ limit: 50 });
        }
        if (!allProjects.length) allProjects = getFallbackProjects();
      } catch {
        allProjects = getFallbackProjects();
      }
      renderFiltered('all');
    }

    function renderFiltered(filter) {
      const grid = document.getElementById('projectsGrid');
      const filtered = filter === 'all'
        ? allProjects
        : allProjects.filter(p => p.tag === filter);

      if (!filtered.length) {
        grid.innerHTML = '<p style="color:var(--gray-400);grid-column:1/-1">Belum ada proyek dalam kategori ini.</p>';
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <article class="project-card" data-tag="${p.tag || ''}">
          ${p.image_url
            ? `<img src="${p.image_url}" alt="${p.title}" class="project-card__img" loading="lazy">`
            : `<div class="project-card__img-placeholder">${p.emoji || '🛠️'}</div>`
          }
          <div class="project-card__body">
            <span class="project-tag">${p.tag || 'Project'}</span>
            <h3>${p.title}</h3>
            <p>${p.summary || ''}</p>
            ${p.url ? `<a href="${p.url}" target="_blank" class="btn btn--outline" style="margin-top:1rem;font-size:.75rem;padding:.5rem 1rem;">Lihat Demo →</a>` : ''}
          </div>
        </article>
      `).join('');
    }

    // Filter buttons
    document.getElementById('filterBar').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderFiltered(btn.dataset.filter);
    });

    function getFallbackProjects() {
      return [
        { emoji: '📋', tag: 'Google Apps Script', title: 'Sistem Absensi Otomatis', summary: 'Otomatisasi absensi karyawan menggunakan Google Forms & Sheets dengan notifikasi email.' },
        { emoji: '📦', tag: 'AppSheet', title: 'Aplikasi Inventaris', summary: 'Manajemen stok gudang real-time menggunakan AppSheet + Google Sheets.' },
        { emoji: '📈', tag: 'Excel', title: 'Dashboard Keuangan', summary: 'Laporan keuangan bulanan otomatis dengan Power Query & grafik dinamis.' },
        { emoji: '🌐', tag: 'Web App', title: 'Portal Internal CKBLogistic', summary: 'Digital HUB internal untuk manajemen data logistik berbasis Apps Script Web App.' },
        { emoji: '📧', tag: 'Google Apps Script', title: 'Email Blast Otomatis', summary: 'Kirim ribuan email personalisasi via Gmail dengan Google Apps Script + Sheets.' },
        { emoji: '📱', tag: 'AppSheet', title: 'Sistem Pengajuan Cuti', summary: 'Aplikasi pengajuan dan approval cuti karyawan tanpa kode berbasis AppSheet.' },
      ];
    }

    initProjects();
  </script>
