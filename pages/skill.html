  <script>
    async function initSkills() {
      const container = document.getElementById('skillCategories');
      let skills = [];
      try {
        if (window.DB) skills = await window.DB.loadSkills();
        if (!skills.length) skills = getFallbackSkills();
      } catch { skills = getFallbackSkills(); }

      // Group by category
      const groups = skills.reduce((acc, s) => {
        const cat = s.category || 'Lainnya';
        if (!acc[cat]) acc[cat] = [];
        acc[cat].push(s);
        return acc;
      }, {});

      container.innerHTML = Object.entries(groups).map(([cat, items]) => `
        <div class="skill-category">
          <h2 class="skill-category__title">${cat}</h2>
          <div class="skills-list">
            ${items.map(s => `
              <div class="skill-item">
                <span class="skill-item__icon">${s.icon || '🔧'}</span>
                <div style="flex:1">
                  <p class="skill-item__name">${s.name}</p>
                  <div class="skill-item__bar-wrap">
                    <div class="skill-item__bar" style="width:${s.level||80}%"></div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function getFallbackSkills() {
      return [
        { name: 'Google Apps Script', category: 'Google Workspace', icon: '⚡', level: 95 },
        { name: 'Google Sheets',      category: 'Google Workspace', icon: '📊', level: 95 },
        { name: 'Google Forms',       category: 'Google Workspace', icon: '📋', level: 85 },
        { name: 'AppSheet',           category: 'No-Code Tools',    icon: '📱', level: 90 },
        { name: 'Microsoft Excel',    category: 'Office Tools',     icon: '📈', level: 90 },
        { name: 'Power Query',        category: 'Office Tools',     icon: '🔄', level: 85 },
        { name: 'HTML / CSS',         category: 'Web Development',  icon: '🌐', level: 80 },
        { name: 'JavaScript',         category: 'Web Development',  icon: '🟨', level: 75 },
        { name: 'Supabase',           category: 'Database',         icon: '🐘', level: 70 },
      ];
    }

    initSkills();
  </script>
